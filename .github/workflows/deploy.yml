name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Commits made by refresh-stars.yml using GITHUB_TOKEN do not trigger
  # `push` workflows (GitHub's anti-recursion guard). The workflow_run
  # trigger fires on completion of that workflow and bypasses the guard,
  # so weekly star refreshes actually reach production.
  workflow_run:
    workflows: ["Refresh star counts"]
    types: [completed]
    branches: [main]

# Opt into Node 24 for all JS-based actions ahead of GitHub's June 2026
# forced switch. Without this we run on deprecated Node 20.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Required for the deploy-pages action to write to the Pages environment.
# Requires repository Settings → Pages → Source = "GitHub Actions".
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; don't cancel a running one (so a
# completed deploy isn't replaced mid-flight by a less-baked build).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    # For workflow_run triggers, only proceed if the upstream workflow
    # actually succeeded — don't deploy after a failed star refresh.
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # workflow_run's default SHA is the commit that triggered the
          # *upstream* workflow, not the commit the upstream made. Pin to
          # main so we always pick up the freshly-committed stars.json.
          ref: main

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
