name: Refresh star counts

on:
  schedule:
    # Mondays at 06:00 UTC. Stars aren't the story here; relative
    # maturity is — weekly is plenty and sidesteps API rate limits.
    - cron: '0 6 * * 1'
  workflow_dispatch:

# Opt into Node 24 for all JS-based actions ahead of GitHub's June 2026
# forced switch. Without this we run on deprecated Node 20.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        # Same requirements.txt scripts/setup.sh uses locally. CI doesn't
        # need a venv (Ubuntu runner doesn't enforce PEP 668), but sharing
        # the file keeps dependency pinning in one place.
        run: pip install -r scripts/requirements.txt

      - name: Refresh src/data/stars.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/refresh_stars.py

      - name: Commit if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if git diff --quiet src/data/stars.json; then
            echo "No changes to stars.json — nothing to commit."
          else
            git add src/data/stars.json
            git commit -m "chore: refresh GitHub star counts"
            git push
          fi
