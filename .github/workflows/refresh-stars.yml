name: Refresh star counts

on:
  schedule:
    # Mondays at 06:00 UTC. Stars aren't the story here; relative
    # maturity is — weekly is plenty and sidesteps API rate limits.
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Refresh src/data/stars.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/refresh_stars.py

      - name: Commit if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if git diff --quiet src/data/stars.json; then
            echo "No changes to stars.json — nothing to commit."
          else
            git add src/data/stars.json
            git commit -m "chore: refresh GitHub star counts"
            git push
          fi
