<?xml version="1.0" encoding="UTF-8"?>
<!-- agentlanguages.dev — three camp colours (Syntactic / Verification /
     Orchestration) as a rounded-square brand mark. Matches the colour
     vocabulary used on cards, the camp filter chips, and the OG image. -->
<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <clipPath id="r">
      <rect x="0" y="0" width="32" height="32" rx="6" ry="6"/>
    </clipPath>
  </defs>
  <g clip-path="url(#r)">
    <rect x="0"  y="0" width="11" height="32" fill="#3E5C76"/>
    <rect x="11" y="0" width="10" height="32" fill="#A1623B"/>
    <rect x="21" y="0" width="11" height="32" fill="#5A7A53"/>
  </g>
</svg>
